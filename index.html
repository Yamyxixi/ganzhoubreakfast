        { name: "燕子婆早餐店", address: "章贡区黄屋坪路25-10号", mapLink: "https://uri.amap.com/marker?position=114.946429,25.843371&name=%E7%87%95%E5%AD%90%E5%A9%86%E6%97%A9%E9%A4%90%E5%BA%97&src=赣州早餐抽签&callnative=1", imageUrl: "https://pic1.imgdb.cn/item/69a25a90ec0a30908d67eb6a.jpg", rating: 4.7, summary: "小红书热门榜常客，肉丸汤被网友称为‘赣州第一’。大众点评4.6星，老城区居民从小吃到大，拌粉用的花生米和萝卜干都是自制，油条现炸酥脆。不少外地游客专程来打卡，早上八点后可能需要排队。", recommended: ["肉丸汤", "拌粉", "油条"] },
        { name: "周记早点(阳明路店)", address: "章贡区坛子巷11-A-3", mapLink: "https://uri.amap.com/marker?position=114.942450,25.863263&name=%E5%91%A8%E8%AE%B0%E6%97%A9%E7%82%B9(%E9%98%B3%E6%98%8E%E8%B7%AF%E5%BA%97)&src=赣州早餐抽签&callnative=1", imageUrl: "https://pic1.imgdb.cn/item/69a25d51ec0a30908d67ec27.jpg", rating: 4.5, summary: "老赣州人从小吃到大的早餐店，豆浆是石磨现磨，浓郁无渣。油条炸得金黄酥脆，搭配特制辣椒酱很受欢迎。美团早餐热搜榜常客，很多人评价‘油条配豆浆，绝配’。店面不大但干净整洁，老板娘热情。", recommended: ["豆浆", "油条", "茶叶蛋"] },
        { name: "阿乌叼早餐", address: "章贡区天竺山路12号", mapLink: "https://uri.amap.com/marker?position=114.920426,25.818247&name=%E9%98%BF%E4%B9%8C%E5%8F%BC%E6%97%A9%E9%A4%90&src=赣州早餐抽签&callnative=1", imageUrl: "https://pic1.imgdb.cn/item/69a25a9eec0a30908d67eb6c.jpg", rating: 4.4, summary: "大众点评收录6年老店，三鲜粉料足汤浓，猪肝、瘦肉、小肠都是现烫，新鲜不腥。本地人推荐‘一定要加辣椒油’，他们家的辣椒油是秘制的，香而不燥。小红书博主称‘隐藏的嗦粉宝地’，很多人从老城区专程过去。", recommended: ["三鲜粉", "猪肝汤"] },
        { name: "东郊路早餐店", address: "章贡区东郊路12-3号", mapLink: "https://uri.amap.com/marker?position=114.957959,25.854485&name=%E4%B8%9C%E9%83%8A%E8%B7%AF%E6%97%A9%E9%A4%90%E5%BA%97&src=赣州早餐抽签&callnative=1", imageUrl: "https://pic1.imgdb.cn/item/69a25ab0ec0a30908d67eb74.jpg", rating: 4.5, summary: "没有招牌的社区店，但大众点评上好评如潮。心肺汤是招牌，面条是自己做的，筋道有嚼劲，卤汁里加了香菇，特别香。许多顾客从城北开车来吃，就为了这一口。老板记性好，熟客的口味都记得。", recommended: ["心肺汤", "卤蛋"] },
        { name: "咪咪早点", address: "章贡区小华兴街与和平路交叉口", mapLink: "https://uri.amap.com/marker?position=114.929168,25.788125&name=%E5%92%AA%E5%92%AA%E6%97%A9%E7%82%B9&src=赣州早餐抽签&callnative=1", imageUrl: "https://pic1.imgdb.cn/item/69a25ac1ec0a30908d67eb77.jpg", rating: 4.3, summary: "美团评分4.4，主打蒸饺和拌粉。蒸饺皮薄馅大，肉馅鲜甜多汁，配着免费的萝卜干特别开胃。老板娘很热情，记得不少熟客的口味。价格实惠，人均8元能吃饱。很多附近的上班族早餐首选。", recommended: ["蒸饺", "拌粉", "萝卜干"] },
        { name: "健民现磨豆浆", address: "章贡区人民巷2号", mapLink: "https://uri.amap.com/marker?position=114.939175,25.853003&name=%E5%81%A5%E6%B0%91%E7%8E%B0%E7%A3%A8%E8%B1%86%E6%B5%86&src=赣州早餐抽签&callnative=1", imageUrl: "https://pic1.imgdb.cn/item/69a25aceec0a30908d67eb78.jpg", rating: 4.8, summary: "小红书爆款，号称‘赣州最好喝的豆浆’。每天早上现磨，豆浆浓郁无渣，豆香十足。搭配现炸油条或烧麦，人均5元就能饱腹。大众点评五星好评，很多人评论‘喝完才知道以前喝的豆浆都是水’。", recommended: ["现磨豆浆", "烧麦", "油条"] },
        { name: "华顺美食", address: "章贡区东阳山路8号4-5号", mapLink: "https://uri.amap.com/marker?position=114.938521,25.847681&name=%E5%8D%8E%E9%A1%BA%E7%BE%8E%E9%A3%9F&src=赣州早餐抽签&callnative=1", imageUrl: "https://pic1.imgdb.cn/item/69a25c7cec0a30908d67ebe8.jpg", rating: 4.3, summary: "主打炒粉和瓦罐汤的早餐店，锅气十足。牛肉炒粉牛肉给得多，米粉干爽不油腻。瓦罐汤种类多，香菇肉饼汤最受欢迎。附近上班族和居民经常光顾，高峰期需要等位。大众点评评价‘物美价廉，分量足’。", recommended: ["牛肉炒粉", "香菇肉饼汤"] },
        { name: "津香餐馆", address: "章贡区西津路15-1号", mapLink: "https://uri.amap.com/marker?position=114.938671,25.861801&name=%E6%B4%A5%E9%A6%99%E9%A4%90%E9%A6%86&src=赣州早餐抽签&callnative=1", imageUrl: "https://pic1.imgdb.cn/item/69a25c91ec0a30908d67ebf1.jpg", rating: 4.4, summary: "天津风味早餐店，在赣州开了十几年。包子是招牌，鲜肉包皮薄馅大，咬开有汤汁。豆腐脑有咸甜两种，很多学生和老师常来。小红书博主推荐‘肉包子配豆浆，北方人的早餐’。", recommended: ["鲜肉包", "豆腐脑"] },
        { name: "民扬早餐", address: "章贡区赣州经济技术开发区蟠龙镇河坝小区5栋7号", mapLink: "https://uri.amap.com/marker?position=114.880344,25.835736&name=%E6%B0%91%E6%89%AC%E6%97%A9%E9%A4%90&src=赣州早餐抽签&callnative=1", imageUrl: "https://pic1.imgdb.cn/item/69a25bcbec0a30908d67ebbc.jpg", rating: 4.4, summary: "居民区里的早餐店，生意火爆。包子、肉饼汤是招牌，肉饼鲜嫩，汤清甜不腻。拌粉用的花生米特别香，辣椒油自己加。大众点评上很多人评论‘从小学吃到现在，还是那个味道’。价格亲民，分量足。", recommended: ["肉饼汤", "拌粉"] },
        { name: "德期饮食店", address: "章贡区海会路与厚德路交叉口北80米", mapLink: "https://uri.amap.com/marker?position=114.949182,25.858838&name=%E5%BE%B7%E6%9C%9F%E9%A5%AE%E9%A3%9F%E5%BA%97&src=赣州早餐抽签&callnative=1", imageUrl: "https://pic1.imgdb.cn/item/69a25bddec0a30908d67ebc8.jpg", rating: 4.5, summary: "开了三十年的老字号，很多老赣州人从小吃到大。炸茄子米果是招牌，特别香。鹌鹑蛋肉饼汤清淡鲜美，本地粉绝配。店面不大，但每天早上一波接一波的客人。", recommended: ["腌菜炒饭", "蛋皮汤"] },
        { name: "温阿姨.瑞金烂厅下牛肉汤", address: "章贡区红环路7-6号", mapLink: "https://uri.amap.com/marker?position=114.933899,25.852060&name=%E6%B8%A9%E9%98%BF%E5%A7%A8.%E7%91%9E%E9%87%91%E7%83%82%E5%8E%85%E4%B8%8B%E7%89%9B%E8%82%89%E6%B1%A4&src=赣州早餐抽签&callnative=1", imageUrl: "https://pic1.imgdb.cn/item/69a25adaec0a30908d67eb86.jpg", rating: 4.9, summary: "源自瑞金的百年老字号，大众点评赣州牛肉汤第一名。汤底用几十种药材熬制，牛肉鲜嫩，汤醇厚不腻。可以免费续汤，配着现烤烧饼吃特别香。小红书评价‘暖心暖胃，牛肉分量足，值得排队’。", recommended: ["招牌牛肉汤", "牛杂汤", "烧饼"] },
        { name: "于振华美食(章江北大道店)", address: "章贡区章江北大道88号", mapLink: "https://uri.amap.com/marker?position=114.929348,25.844518&name=%E4%BA%8E%E6%8C%AF%E5%8D%8E%E7%BE%8E%E9%A3%9F(%E7%AB%A0%E6%B1%9F%E5%8C%97%E5%A4%A7%E9%81%93%E5%BA%97)&src=赣州早餐抽签&callnative=1", imageUrl: "https://pic1.imgdb.cn/item/69a25ae9ec0a30908d67eb88.jpg", rating: 4.6, summary: "美团高分店铺，三鲜粉是招牌。猪肝、瘦肉、小肠处理得特别干净，没有腥味，汤清味鲜。很多外地游客专门打卡。环境干净，服务态度好。", recommended: ["三鲜粉"] },
        { name: "李记烧饼(营角上路店)", address: "章贡区柴火坪19-1", mapLink: "https://uri.amap.com/marker?position=114.939938,25.847788&name=%E6%9D%8E%E8%AE%B0%E7%83%A7%E9%A5%BC(%E8%90%A5%E8%A7%92%E4%B8%8A%E8%B7%AF%E5%BA%97)&src=赣州早餐抽签&callnative=1", imageUrl: "https://pic1.imgdb.cn/item/69a25af4ec0a30908d67eb95.jpg", rating: 4.7, summary: "20年老店，烧饼外酥里软，梅干菜肉馅最受欢迎。每天现烤现卖，刚出炉的烧饼烫手但特别香。大众点评评价‘每次路过必买，趁热吃绝了’。除了梅干菜的，还有鲜肉和红糖馅的。", recommended: ["梅干菜烧饼", "鲜肉烧饼"] },
        { name: "兴国米粉鱼(黄屋坪路店)", address: "章贡区东外街道黄屋坪路27-6号", mapLink: "https://uri.amap.com/marker?position=114.946490,25.843190&name=%E5%85%B4%E5%9B%BD%E7%B1%B3%E7%B2%89%E9%B1%BC(%E9%BB%84%E5%B1%8B%E5%9D%AA%E8%B7%AF%E5%BA%97)&src=赣州早餐抽签&callnative=1", imageUrl: "https://pic1.imgdb.cn/item/69a25b03ec0a30908d67eb99.jpg", rating: 4.8, summary: "兴国特色早餐，米粉鱼是必点。草鱼块裹米粉蒸制，鲜辣入味，底下垫的芋头吸收了鱼汁特别好吃。小红书称‘赣州早餐界扛把子’。可以搭配一碗瓦罐汤，完美。", recommended: ["米粉鱼", "芋头蒸肉"] },
        { name: "老王信丰萝卜饺", address: "章贡区红旗村渔湾里美食街f2号", mapLink: "https://uri.amap.com/marker?position=114.928259,25.845491&name=%E8%80%81%E7%8E%8B%E4%BF%A1%E4%B8%B0%E8%90%9D%E5%8D%9C%E9%A5%BA&src=赣州早餐抽签&callnative=1", imageUrl: "https://pic1.imgdb.cn/item/69a25b10ec0a30908d67eba0.jpg", rating: 4.6, summary: "渔湾里必吃小吃，萝卜饺晶莹剔透，内馅是萝卜丝和辣椒，酸甜开胃。艾米果也值得一试，软糯香甜。大众点评常年位居小吃榜前列，很多游客专门来打卡。", recommended: ["信丰萝卜饺", "艾米果"] },
        { name: "廖婆婆早餐店(文清路店)", address: "章贡区黄屋坪路14号", mapLink: "https://uri.amap.com/marker?position=114.946204,25.844072&name=%E5%BB%96%E5%A9%86%E5%A9%86%E6%97%A9%E9%A4%90%E5%BA%97(%E6%96%87%E6%B8%85%E8%B7%AF%E5%BA%97)&src=赣州早餐抽签&callnative=1", imageUrl: "https://pic1.imgdb.cn/item/69a25b22ec0a30908d67eba5.jpg", rating: 4.7, summary: "南昌瓦罐汤与赣州本地口味结合的典范，肉饼汤鲜香，肉饼紧实不散。拌粉爽滑，花生米特别脆。小红书博主称‘早餐来一罐汤，元气满满’。店面虽小，但干净整洁。", recommended: ["肉饼汤", "香菇鸡汤拌粉"] },
        { name: "一碗嗦粉", address: "章贡区健康路71-1号", mapLink: "https://uri.amap.com/marker?position=114.945110,25.850780&name=%E4%B8%80%E7%A2%97%E5%97%A6%E7%B2%89&src=赣州早餐抽签&callnative=1", imageUrl: "https://pic1.imgdb.cn/item/69a25b2dec0a30908d67ebaa.jpg", rating: 4.5, summary: "江南宋城景区旁的网红嗦粉店，装修复古，拍照很出片。大众点评推荐‘牛肉拌粉’和‘猪血汤’。牛肉卤得入味，粉条爽滑。游客评价‘逛古城顺便嗦粉，体验很好’。", recommended: ["牛肉拌粉", "猪血汤"] },
        { name: "张记传统烧饼", address: "章贡区南京路7号", mapLink: "https://uri.amap.com/marker?position=114.942474,25.859380&name=%E5%BC%A0%E8%AE%B0%E4%BC%A0%E7%BB%9F%E7%83%A7%E9%A5%BC&src=赣州早餐抽签&callnative=1", imageUrl: "https://pic1.imgdb.cn/item/69a25b39ec0a30908d67ebac.jpg", rating: 4.6, summary: "老赣州人从小吃到大的烧饼摊，现在有了店面。烧饼有甜咸两种，红糖烧饼是招牌，咬开能流糖。美团评价‘便宜又好吃，满满的回忆’。每天早上排队，经常十点就卖完了。", recommended: ["红糖烧饼", "葱油烧饼"] },
        { name: "十字街老太婆（赣一中店）", address: "章江路12号富苑小区12-7至8号铺位", mapLink: "https://uri.amap.com/marker?position=114.925551,25.822795&name=%E5%8D%81%E5%AD%97%E8%A1%97%E8%80%81%E5%A4%AA%E5%A9%86%EF%BC%88%E8%B5%A3%E4%B8%80%E4%B8%AD%E5%BA%97%EF%BC%89&src=赣州早餐抽签&callnative=1", imageUrl: "https://pic1.imgdb.cn/item/69a25bb3ec0a30908d67ebb8.jpg", rating: 4.4, summary: "24小时营业的南昌小吃店，是很多人的深夜食堂。南昌拌粉味道正宗，瓦罐汤种类多。小红书评价‘味道正宗，价格实惠’。学生和出租车司机经常光顾。", recommended: ["南昌拌粉", "鸡蛋肉饼汤"] },
        { name: "余水胜美食", address: "章贡区宁都路17-13号店铺瑞安家园安置小区底层", mapLink: "https://uri.amap.com/marker?position=114.939647,25.824837&name=%E4%BD%99%E6%B0%B4%E8%83%9C%E7%BE%8E%E9%A3%9F&src=赣州早餐抽签&callnative=1", imageUrl: "https://pic1.imgdb.cn/item/69a25bc0ec0a30908d67ebb9.jpg", rating: 4.3, summary: "铅山烫粉特色店，米粉Q弹有嚼劲，汤底浓郁。很多上饶人评价‘是家乡的味道’。炒粉也不错，锅气足。店面不大，但干净卫生。", recommended: ["铅山烫粉", "炒粉"] },
        { name: "安远三鲜粉（瑞安店）", address: "章贡区水南镇瑞安家园安置小区底层宁都路17-40号", mapLink: "https://uri.amap.com/marker?position=114.940049,25.823968&name=%E5%AE%89%E8%BF%9C%E4%B8%89%E9%B2%9C%E7%B2%89%EF%BC%88%E7%91%9E%E5%AE%89%E5%BA%97%EF%BC%89&src=赣州早餐抽签&callnative=1", imageUrl: "https://pic1.imgdb.cn/item/69a25c70ec0a30908d67ebe7.jpg", rating: 4.6, summary: "正宗安远三鲜粉，猪肝、瘦肉、小肠新鲜现煮，汤鲜味美。可以加荷包蛋和卤豆腐。大众点评4.5星，很多人评论‘比安远本地的还好吃’。", recommended: ["三鲜粉", "卤豆腐"] },
        { name: "芳玉美食", address: "章贡区南河路25号南河花园", mapLink: "https://uri.amap.com/marker?position=114.934200,25.844216&name=%E8%8A%B3%E7%8E%89%E7%BE%8E%E9%A3%9F&src=赣州早餐抽签&callnative=1", imageUrl: "https://pic1.imgdb.cn/item/69a25ca4ec0a30908d67ebf4.jpg", rating: 4.5, summary: "开了十几年的早餐店，萝卜饺和艾米果很受欢迎。萝卜饺皮薄馅足，蘸着辣椒醋吃特别开胃。艾米果软糯，有咸甜两种。本地人常去的老店。", recommended: ["萝卜饺", "艾米果"] },
        { name: "曾记萝卜饺艾米果（人民巷店）", address: "章贡区人民巷35号", mapLink: "https://uri.amap.com/marker?position=114.938398,25.852959&name=%E6%9B%BE%E8%AE%B0%E8%90%9D%E5%8D%9C%E9%A5%BA%E8%89%BE%E7%B1%B3%E6%9E%9C%EF%BC%88%E4%BA%BA%E6%B0%91%E5%B7%B7%E5%BA%97%EF%BC%89&src=赣州早餐抽签&callnative=1", imageUrl: "https://pic1.imgdb.cn/item/69a25cb2ec0a30908d67ebf9.jpg", rating: 4.7, summary: "人民巷里的老字号，萝卜饺晶莹剔透，能看到里面的馅料。艾米果软糯香甜，豆沙馅是自己熬的。小红书热门打卡地，很多人专门来买真空包装带走。", recommended: ["信丰萝卜饺", "艾米果"] },

        { name: "味然鲜早餐店", address: "章贡区蓉江路与三百山路交叉路口西南侧", mapLink: "https://uri.amap.com/marker?position=114.929757,25.813053&name=%E5%91%B3%E7%84%B6%E9%B2%9C%E6%97%A9%E9%A4%90%E5%BA%97&src=赣州早餐抽签&callnative=1", imageUrl: "https://pic1.imgdb.cn/item/69a25d41ec0a30908d67ec24.jpg", rating: 4.3, summary: "主打三鲜粉和肉丸汤，分量足，价格实惠。三鲜粉的猪肝和瘦肉处理得好，不腥不柴。肉丸Q弹。学生和附近居民常来，性价比高。", recommended: ["三鲜粉", "肉丸汤"] }

    // ========== 图片加载优化函数 ==========
    function loadImageWithPlaceholder(imgElement, src, containerElement) {
        // 显示加载状态
        containerElement.classList.add('loading');
        
        // 创建临时图片对象加载
        const tempImg = new Image();
        tempImg.crossOrigin = 'anonymous';
        
        tempImg.onload = function() {
            // 加载完成后替换并显示
            imgElement.src = src;
            imgElement.style.display = 'block';
            containerElement.classList.remove('loading');
        };
        
        tempImg.onerror = function() {
            // 加载失败显示默认图（背景图）
            imgElement.src = 'https://pic1.imgdb.cn/item/69a0e768569239540e67a601.jpg';
            imgElement.style.display = 'block';
            containerElement.classList.remove('loading');
        };
        
        // 开始加载
        tempImg.src = src;
    }

    // ========== 背景音乐优化控制 ==========
    const bgMusic = document.getElementById('bgMusic');
    const musicToggle = document.getElementById('musicToggle');
    const musicIcon = document.getElementById('musicIcon');
    let musicPlaying = false;
    const NORMAL_VOLUME = 0.5;
    const LOW_VOLUME = 0.15;

    // 初始化音频
    bgMusic.volume = NORMAL_VOLUME;
    bgMusic.load();

    // 监听音频可以流畅播放的事件
    bgMusic.addEventListener('canplaythrough', () => {
        console.log('音频缓冲完成，可流畅播放');
    });

    // 监听卡顿事件，自动重试
    bgMusic.addEventListener('stalled', () => {
        console.log('音频加载卡顿，尝试重新加载');
        bgMusic.load();
    });

    // 监听错误
    bgMusic.addEventListener('error', (e) => {
        console.error('音频加载失败', e);
        musicIcon.textContent = '🔇';
        musicPlaying = false;
    });

    // 用户首次点击页面任意位置时尝试播放音乐（解决自动播放限制）
    document.addEventListener('click', function initMusic() {
        if (!musicPlaying) {
            // 如果已经缓冲完成，立即播放
            if (bgMusic.readyState >= 3) { // HAVE_FUTURE_DATA
                bgMusic.play().then(() => {
                    musicPlaying = true;
                    musicIcon.textContent = '🔊';
                }).catch(e => console.log('播放失败', e));
            } else {
                // 否则等待 canplaythrough
                bgMusic.addEventListener('canplaythrough', function onCanPlay() {
                    bgMusic.play().then(() => {
                        musicPlaying = true;
                        musicIcon.textContent = '🔊';
                    }).catch(e => console.log('播放失败', e));
                    bgMusic.removeEventListener('canplaythrough', onCanPlay);
                }, { once: true });
            }
        }
        document.removeEventListener('click', initMusic);
    }, { once: true });

    // 点击按钮切换播放/暂停
    musicToggle.addEventListener('click', function(e) {
        e.stopPropagation();
        if (musicPlaying) {
            bgMusic.pause();
            musicIcon.textContent = '🔇';
        } else {
            // 尝试播放，如果尚未缓冲完成，等待缓冲
            if (bgMusic.readyState >= 3) {
                bgMusic.play().then(() => {
                    musicIcon.textContent = '🔊';
                }).catch(e => console.log('播放失败'));
            } else {
                musicIcon.textContent = '⏳';
                bgMusic.addEventListener('canplaythrough', function onCanPlay() {
                    bgMusic.play().then(() => {
                        musicIcon.textContent = '🔊';
                    }).catch(e => console.log('播放失败'));
                    bgMusic.removeEventListener('canplaythrough', onCanPlay);
                }, { once: true });
            }
        }
        musicPlaying = !musicPlaying;
    });

    // ========== 摇签音效 ==========
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx = null;
    function playStickSound() {
        try {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const now = audioCtx.currentTime;
            
            const noiseBuffer = audioCtx.createBuffer(1, 4096, audioCtx.sampleRate);
            const noiseData = noiseBuffer.getChannelData(0);
            for (let i = 0; i < 4096; i++) {
                noiseData[i] = Math.random() * 2 - 1;
            }
            const noiseSource = audioCtx.createBufferSource();
            noiseSource.buffer = noiseBuffer;
            
            const noiseGain = audioCtx.createGain();
            noiseGain.gain.setValueAtTime(0.15, now);
            noiseGain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
            
            const osc = audioCtx.createOscillator();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(800, now);
            osc.frequency.exponentialRampToValueAtTime(300, now + 0.1);
            
            const oscGain = audioCtx.createGain();
            oscGain.gain.setValueAtTime(0.08, now);
            oscGain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
            
            noiseSource.connect(noiseGain).connect(audioCtx.destination);
            osc.connect(oscGain).connect(audioCtx.destination);
            
            noiseSource.start(now);
            osc.start(now);
            noiseSource.stop(now + 0.2);
            osc.stop(now + 0.2);
        } catch (e) { /* 静音降级 */ }
    }

    // ========== 抽签逻辑 ==========
    const container = document.getElementById('lotteryContainer');
    const shakeBtn = document.getElementById('shakeBtn');
    const resetBtn = document.getElementById('resetBtn');
    const resultCard = document.getElementById('resultCard');
    const resultImg = document.getElementById('resultImg');
    const resultPhoto = document.getElementById('resultPhoto');
    const resultName = document.getElementById('resultName');
    const resultAddress = document.getElementById('resultAddress');
    const resultRec = document.getElementById('resultRec');
    const resultSummary = document.getElementById('resultSummary');
    const resultNav = document.getElementById('resultNav');
    const allSticks = document.querySelectorAll('.lottery-stick');

    let isDrawing = false;

    shakeBtn.addEventListener('click', function() {
        if (isDrawing) return;
        isDrawing = true;
        shakeBtn.disabled = true;

        // 抽签开始时，背景音乐降低音量
        bgMusic.volume = LOW_VOLUME;

        // 播放摇签音效
        playStickSound();

        // 隐藏之前的结果卡片
        resultCard.style.display = 'none';
        // 移除所有签子的弹出状态，并清空文字
        allSticks.forEach(stick => {
            stick.classList.remove('popup');
            stick.querySelector('.stick-text').textContent = '';
        });

        // 触发容器晃动动画
        container.classList.add('shaking');

        // 晃动1.2秒后停止并弹出签子
        setTimeout(() => {
            container.classList.remove('shaking');

            // 随机选择一支签子弹出
            const randomIndex = Math.floor(Math.random() * allSticks.length);
            const selectedStick = allSticks[randomIndex];
            selectedStick.classList.add('popup');

            // 随机选择一家早餐店
            const shopIndex = Math.floor(Math.random() * breakfastSpots.length);
            const spot = breakfastSpots[shopIndex];

            // 将弹出签子的文字设置为店铺名称
            selectedStick.querySelector('.stick-text').textContent = spot.name;

            // 0.5秒后显示店铺信息卡片，并恢复背景音乐音量
            setTimeout(() => {
                // 优化图片加载
                loadImageWithPlaceholder(resultImg, spot.imageUrl, resultPhoto);
                
                resultName.textContent = spot.name;
                resultAddress.textContent = spot.address;
                const recHtml = spot.recommended.map(item => `<span>${item}</span>`).join(' ');
                resultRec.innerHTML = recHtml;
                resultSummary.textContent = spot.summary;
                resultNav.href = spot.mapLink;

                resultCard.style.display = 'block';
                resetBtn.style.display = 'inline-block';

                // 抽签结束，恢复背景音乐音量
                bgMusic.volume = NORMAL_VOLUME;

                // 动画结束后恢复按钮状态
                setTimeout(() => {
                    isDrawing = false;
                    shakeBtn.disabled = false;
                }, 200);
            }, 500);

        }, 1200);
    });

    // 重置逻辑
    resetBtn.addEventListener('click', function() {
        if (isDrawing) return;
        // 隐藏结果和重置按钮
        resultCard.style.display = 'none';
        resetBtn.style.display = 'none';
        // 重置所有签子状态
        allSticks.forEach(stick => {
            stick.classList.remove('popup');
            stick.querySelector('.stick-text').textContent = '';
            void stick.offsetHeight;
        });
        // 清空图片
        resultImg.src = '';
        resultImg.style.display = 'none';
        // 启用摇签按钮
        shakeBtn.disabled = false;
        isDrawing = false;
    });

    // 移动端触摸支持
    shakeBtn.addEventListener('touchstart', function(e) {
        e.preventDefault();
        shakeBtn.click();
    });
    resetBtn.addEventListener('touchstart', function(e) {
        e.preventDefault();
        resetBtn.click();
    });

    // 渲染30家店介绍卡片（无图片，无需懒加载）
    const containerGrid = document.getElementById('shopListContainer');
    function renderShopCards() {
        let html = '';
        breakfastSpots.forEach(shop => {
            const fullStars = Math.floor(shop.rating);
            const halfStar = shop.rating % 1 >= 0.5 ? '½' : '';
            const stars = '★'.repeat(fullStars) + halfStar;
            const recHtml = shop.recommended.map(item => `<span>${item}</span>`).join(' ');
            html += `
                <div class="shop-card">
                    <h3>${shop.name}</h3>
                    <div class="address">📍 ${shop.address}</div>
                    <div class="rating">
                        <span class="stars">${stars}</span>
                        <span class="rating-score">${shop.rating.toFixed(1)}</span>
                    </div>
                    <div class="summary">${shop.summary}</div>
                    <div class="recommend">👍 推荐：${recHtml}</div>
                </div>
            `;
        });
        containerGrid.innerHTML = html;
    }
    
    // 页面加载完成后渲染店铺卡片
    document.addEventListener('DOMContentLoaded', function() {
        renderShopCards();
    });
})();
</script>
